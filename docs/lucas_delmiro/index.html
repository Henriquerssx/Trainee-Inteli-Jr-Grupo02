<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Lucas Delmiro - Card IA</title>
	<link href="https://fonts.googleapis.com/css2?family=Fragment+Mono&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<main class="page">
		<section class="ai-panel">
			<p class="label">Análise IA</p>
			<h1>Resumo executivo com Groq</h1>
			<p class="description">
				Transforma os dados do dashboard em uma leitura em linguagem natural,
				apontando gargalos e riscos do projeto.
			</p>

			<div class="chips">
				<span>Tarefas</span>
				<span>Atrasadas</span>
				<span>Progresso</span>
				<span>Membros</span>
			</div>

			<!-- Botão sem JS nesta entrega individual — a integração real fica em ai.js e dashboard.js na entrega em grupo -->
			<button class="btn" type="button">Analisar projeto</button>

			<div class="output">
				O resumo da IA apareceria aqui.
			</div>
		</section>
	</main>
</body>
</html>
